name: Validate data

# Guards every change under data/ — whether from the scheduled fetcher or a
# human hand-edit during a feed break. Fails loud (and emails you) if the data
# is malformed, so you can hand-enter scores without fear of corrupting scoring.
on:
  push:
    paths: ["data/**"]
  pull_request:
    paths: ["data/**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate
        run: python scripts/validate_data.py

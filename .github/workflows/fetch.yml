name: Fetch EPL data

# Runs on a schedule to pull fixtures + standings and commit them.
# GitHub emails you automatically if a run fails (that's the alarm).
on:
  schedule:
    # A few times a week, spread across match days. Times are UTC.
    # Fri/Sat/Sun/Mon evenings + a Tuesday catch-up. Adjust as you like.
    - cron: "0 22 * * 5,6,0,1"
    - cron: "0 12 * * 2"
  workflow_dispatch: {}   # lets you run it by hand from the Actions tab

# Least-privilege: only allow committing back to the repo.
permissions:
  contents: write

concurrency:
  group: fetch-epl
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch (validate hard; refuses bad data)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/fetch_results.py --season 2026

      - name: Validate the committed data
        run: python scripts/validate_data.py

      - name: Commit any changes
        run: |
          git config user.name  "matchday-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled fetch $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
